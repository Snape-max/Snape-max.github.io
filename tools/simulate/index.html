<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=0.5">
    <title>电磁波在媒质间反射和折射仿真</title>
    <style type="text/css">
      * {
      /*初始化样式*/
      margin: 0;
      padding: 0;
      }
      html {
        /*用于 获取 屏幕的可视宽高*/
        width: 100%;
        height: 100%;
        overflow: scroll;
      }
      body {
        /*让 body 初始 width 和 height 就 等于 页面可视区域的 宽高*/
        position: fixed;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        /*用于 测试的 样式*/
        letter-spacing: 4px;
        font-size: 18px;
        /*文字居中*/
        display: flex;
        justify-content: center;
        align-items: center;
      }
      @media screen and (orientation:portrait) {
        /*竖屏样式*/
        body {
          transform-origin: 0 0;
          transform: rotateZ(90deg) translateY(-100%);
        }
      }
      #buttom {
        border: 2px solid black;
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        margin: auto;
        z-index: -1;
      }
      #tutorial {
        border: 2px solid black;
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        margin: auto;
      }
      #control{
        position: absolute;
        left: 30px;
        user-select: none;
      }
      #control{
        position: absolute;
        top: 30px;
        left: 30px;
        width: 200px;
        border: 2px black;
        border-width: px;
        border-radius: 10px;
        background-color: rgba(173, 166, 166, 0.253);
      }
      #information{
        user-select: none;
        position: absolute;
        top: 30px;
        right: 30px;
        width: 200px;
        border: 2px black;
        border-width: px;
        border-radius: 10px;
        background-color: rgba(173, 166, 166, 0.253);
      }
      #mu2{
      top: 10%;
      width: 50%; /* 调整搜索框的宽度 */
      padding: 2px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-family: "Comic Sans MS", cursive, sans-serif;  
      text-align: center;
    }
    #epsilon2{
      top: 10%;
      width: 50%; /* 调整搜索框的宽度 */
      padding: 2px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-family: "Comic Sans MS", cursive, sans-serif;  
      text-align: center;
    }
    label{
      user-select: none;
      font-family: "Comic Sans MS", cursive, sans-serif;  
    }
    p {
      user-select: none;
      font-family: "Comic Sans MS", cursive, sans-serif;  
    }
    </style>
  </head>
  <body>
    <div id="control">
      <center>
        <p>介质1参数</p>
      </center>

        <div>
            <center><label>μ<sub>1</sub> = μ<sub>0</sub></label></center>
            <center><label>ε<sub>1</sub> = ε<sub>0</sub></label></center>
        </div>
        <center>
          <p>介质2参数</p>
        </center>
        <div>
            <center>
              <label >μ<sub>r2</sub>=</label>
              <input type="text" id="mu2">
            </center>

        </div>

        <div>
          <center>
            <label >ε<sub>r2</sub>=</label>
            <input type="text"  id="epsilon2">
          </center>

        </div>

        <p style="font-size: 18px;">
          说明:
        </p>
        <p>黑色表示入射波</p>
        <p style="color: red;">红色表示反射波</p>
        <p style="color: blue;">蓝色表示折射波</p>
        <p>颜色深浅表示波强度大小, 以入射波为垂直极化波为例.</p>
    </div>
    <div id="information">
      <center>
        <p id="thetai">入射角: </p>
        <p id="thetar">反射角: </p>
        <p id="thetat">折射角: </p>
        <p id="ga1">Γ <sub>⊥</sub>: </p>
        <p id="tao1">τ <sub>⊥</sub>: </p>
        <p id="ga2">Γ <sub>//</sub>: </p>
        <p id="tao2">τ <sub>//</sub>: </p>
      </center>
    </div>
    <canvas id="buttom" width="800" height="600"></canvas>
    <canvas id="tutorial" width="800" height="600"></canvas>
    
    <script src="scripts.js"></script>
    <script>
      (function () {
        function resize() {
          var body = document.getElementsByTagName('body')[0];
          var html = document.getElementsByTagName('html')[0];
          var width = html.clientWidth;
          var height =  html.clientHeight;
          var max = width > height ? width : height;
          var min = width > height ? height : width;
          body.style.width = max + "px";
          body.style.height = min + "px";
        }
          resize();
          window.addEventListener("resize", resize)
      })();
    </script>
  </body>
</html>
