<h1>猜数字小游戏</h1>
<div class='button'>
	<input id="num" class='put1' placeholder="请输入数字">
</div>
<button class="button" onclick="myfun()">提交</button>
<button class="button" onclick="fun()">弹窗式</button>
<p id='text'></p>
<script>
	function myfun() {
	var x,y,z,n;
	x1 = document.getElementById('num');y = 10
    x = x1.value;
	if (x == y)
	{
		z = '正确';
	}
	else{
		if (x>y){
			z = '大了';	
		}
		else{
			z = '小了';
		}
	}
    
	n = document.getElementById('text');
    n.innerHTML = z;
    n.style.fontSize= x*2;
    
}
function fun() {
	var dd = prompt('请输入一个数字');yy = 10;
	if (dd == yy){
		z = '正确'
	}
	else{
		if (dd>yy) {
			z = '偏大'
		}
		else{
			z = '偏小'
		}
	}
	window.alert(z)
}
function cc() {
	window.confirm('确定离开吗？');
}

</script>
